<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoVibe | Contato</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>Moto<span>Vibe</span></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="modelos.html">Modelos</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Fale Conosco</h2>
        
        <form class="contact-form" action="#" method="POST">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Qual é a sua dúvida ou proposta?"></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Enviar Mensagem</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 MotoVibe. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
